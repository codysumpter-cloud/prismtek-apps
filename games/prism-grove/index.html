<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Prism Grove</title>
<style>
:root{color-scheme:dark;--bg:#101018;--panel:#17172a;--line:#303052;--ink:#f7f7ff;--muted:#b5b5d1;--accent:#5ee7ff;--good:#7cff9b;--warn:#ffd166;--hot:#ff5e78}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,#24535b66,transparent 28rem),linear-gradient(#101018,#0b1714);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.wrap{width:min(1180px,100% - 20px);margin:auto;padding:14px}.top,.bar,.panel{border:2px solid var(--line);background:rgba(23,23,42,.94);box-shadow:0 4px 0 #0006}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px;margin-bottom:12px}.brand h1{margin:0;font-size:28px}.brand p,.muted{color:var(--muted);margin:4px 0 0;font-size:13px}.grid{display:grid;grid-template-columns:minmax(0,760px) minmax(280px,1fr);gap:12px}.panel{padding:12px}canvas{width:100%;aspect-ratio:16/10;background:#16261d;border:2px solid #49613d;image-rendering:pixelated;touch-action:none}.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;padding:10px;margin-top:8px}button,select,input{font:inherit;border:2px solid var(--line);background:#20203a;color:var(--ink);padding:8px 10px}button:hover{border-color:var(--accent);color:var(--accent)}.primary{background:var(--accent);color:#071016;border-color:var(--accent);font-weight:900}.shop,.log{display:grid;gap:8px}.shop button{display:flex;justify-content:space-between}.pill{display:inline-block;border:1px solid var(--line);padding:4px 6px;margin:2px;color:var(--muted);font-size:12px}.good{color:var(--good)}.warn{color:var(--warn)}.hot{color:var(--hot)}dialog{max-width:820px;width:min(94vw,820px);background:#17172a;color:var(--ink);border:3px solid var(--accent);box-shadow:0 0 0 9999px #0009}dialog::backdrop{background:#0008}.creator{display:grid;grid-template-columns:180px 1fr;gap:12px}.avatarCard{height:240px;display:grid;place-items:center;background:#101018;border:2px solid var(--line)}.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}label{display:grid;gap:4px;font-size:12px;color:var(--muted)}@media(max-width:860px){.grid,.creator{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style>
</head>
<body>
<main class="wrap">
  <header class="top"><div class="brand"><h1>Prism Grove</h1><p>Character creator garden test for Prismcade web, macOS, and iOS.</p></div><button class="primary" id="openCreator">Open Character Creator</button></header>
  <section class="grid"><div><canvas id="game" width="768" height="480" aria-label="Prism Grove garden"></canvas><div class="bar"><span id="status">Create your avatar, then grow the grove.</span><span id="stats"></span></div></div><aside class="panel"><h2>Seed Shop</h2><div id="seedShop" class="shop"></div><h2>Avatar</h2><div id="avatarTags"></div><h2>Log</h2><div id="log" class="log"></div></aside></section>
</main>
<div id="game-root" hidden></div>
<dialog id="creator"><form method="dialog"><h2>Character Creation Station</h2><div class="creator"><div class="avatarCard"><canvas id="avatarPreview" width="128" height="160"></canvas></div><div><div class="form"><label>Name<input id="nameInput" maxlength="18" /></label><label>Body<select id="bodyInput"><option>classic</option><option>athletic</option><option>rounded</option></select></label><label>Skin<select id="skinInput"><option value="#f0c7a8">peach</option><option value="#c9855a">tan</option><option value="#8d5738">brown</option><option value="#f6d7b0">fair</option></select></label><label>Hair<select id="hairInput"><option value="#362015">dark brown</option><option value="#7c4a2f">brown</option><option value="#facc15">blonde</option><option value="#6d28d9">purple</option><option value="#111827">black</option></select></label><label>Top<select id="topInput"><option value="#13b7c7">teal hoodie</option><option value="#2f7d32">garden overalls</option><option value="#6d28d9">moon cloak</option><option value="#ef4444">berry jacket</option></select></label><label>Accessory<select id="accessoryInput"><option value="none">none</option><option value="straw-hat">straw hat</option><option value="pumpkin-cap">pumpkin cap</option><option value="prism-pin">prism pin</option></select></label></div><p class="muted">The creator saves into <code>prismcade.localAccount.v0</code>. Prism Grove saves into <code>prismGrove.save.v0</code>.</p><menu><button value="cancel">Cancel</button><button class="primary" id="saveAvatar" value="default">Save Avatar</button></menu></div></div></form></dialog>
<script type="module">
import { createArcadeGame } from "../_shared/prismtek-arcade/arcade-core.js";
void createArcadeGame;
const accountKey="prismcade.localAccount.v0", saveKey="prismGrove.save.v0";
const crops=[['carrot','Carrot',10,18,90,'#f59f3a'],['strawberry','Strawberry',18,36,120,'#ff5e78'],['pumpkin','Pumpkin',60,135,300,'#f97316'],['turnip','Turnip',22,42,150,'#f7d7ff'],['beet','Beet',32,70,210,'#a51c54'],['bluecap','Bluecap',80,180,420,'#5ee7ff'],['tomato','Tomato',45,92,240,'#ef4444'],['sunflower','Sunflower',120,280,600,'#ffe66d']].map(([id,name,seedPrice,value,growth,color])=>({id,name,seedPrice,value,growth,color}));
const variants=[['Golden',3,'#ffe66d',.06],['Giant',2,'#7cff9b',.07],['Moonlit',3,'#a477ff',.04],['Crystal',5,'#5ee7ff',.025],['Stormkissed',4,'#9ca3ff',.035],['Prism',8,'#ff8bd2',.012]].map(([name,mult,color,rate])=>({name,mult,color,rate}));
const defaultAvatar={displayName:'Prismtek',body:'classic',skin:'#f0c7a8',hair:'#362015',top:'#13b7c7',accessory:'none',unlocked:['starter-hoodie-teal'],cosmetics:['starter-hoodie-teal']};
const starter=()=>({coins:80,seeds:{carrot:4},harvests:0,lastSeen:Date.now(),player:{x:390,y:260},selected:'carrot',plots:Array.from({length:18},(_,i)=>({id:i,x:94+(i%6)*72,y:108+Math.floor(i/6)*72,crop:null,watered:false,plantedAt:0,variant:null})),log:['Welcome to Prism Grove.']});
let hadAccount=!!localStorage.getItem(accountKey);
let account=load(accountKey,{id:'local-prism-grove',displayName:'Prismtek',rankTitle:'Garden Rookie',level:1,coins:80,avatar:defaultAvatar,receipts:[]});
let save=load(saveKey,starter());
const c=document.querySelector('#game'),ctx=c.getContext('2d'),keys=new Set(),pointer={x:0,y:0,down:false};ctx.imageSmoothingEnabled=false;
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}function persist(){account.coins=save.coins;localStorage.setItem(accountKey,JSON.stringify(account));localStorage.setItem(saveKey,JSON.stringify(save))}function crop(id){return crops.find(c=>c.id===id)||crops[0]}function log(t){save.log.unshift(t);save.log=save.log.slice(0,7);renderUI();persist()}
function applyOfflineGrowth(){const now=Date.now(),mins=Math.floor((now-(save.lastSeen||now))/60000);save.lastSeen=now;if(mins>0&&save.plots.some(p=>p.crop))log(`While away: ${mins} min passed in the grove.`);for(const p of save.plots)if(p.crop&&p.watered&&progress(p)>=1&&!p.variant)p.variant=rollVariant();persist()}
function progress(p){return p.crop?Math.min(1,(Date.now()-p.plantedAt)/(crop(p.crop).growth*1000)):0}function rollVariant(){for(const v of variants)if(Math.random()<v.rate)return v;return null}
function drawAvatar(g,x,y,s=2){const a=account.avatar||defaultAvatar;g.save();g.translate(x,y);g.scale(s,s);pix(g,-5,-14,10,12,a.top);pix(g,-8,-10,3,9,a.skin);pix(g,5,-10,3,9,a.skin);pix(g,-4,-2,3,10,'#171729');pix(g,1,-2,3,10,'#171729');pix(g,-7,7,5,2,'#0d0d16');pix(g,0,7,5,2,'#0d0d16');pix(g,-6,-28,12,12,a.skin);pix(g,-7,-31,14,5,a.hair);pix(g,-8,-27,3,8,a.hair);pix(g,5,-27,3,7,a.hair);pix(g,-3,-23,2,2,'#111827');pix(g,3,-23,2,2,'#111827');if(a.accessory==='straw-hat'){pix(g,-10,-34,20,3,'#d6a94a');pix(g,-6,-38,12,5,'#c78b31')}if(a.accessory==='pumpkin-cap')pix(g,-7,-35,14,6,'#f97316');if(a.accessory==='prism-pin')pix(g,4,-12,3,3,'#ff8bd2');g.restore()}
function pix(g,x,y,w,h,col){g.fillStyle=col;g.fillRect(Math.round(x),Math.round(y),w,h)}
function draw(){ctx.fillStyle='#17351f';ctx.fillRect(0,0,c.width,c.height);for(let y=0;y<c.height;y+=24)for(let x=0;x<c.width;x+=24){ctx.fillStyle=(x+y)%48?'#1f4326':'#224a2a';ctx.fillRect(x,y,24,24)}ctx.fillStyle='#71543c';ctx.fillRect(44,70,492,292);for(const p of save.plots){ctx.fillStyle=p.watered?'#5f473a':'#8b6445';ctx.fillRect(p.x,p.y,54,42);ctx.strokeStyle='#3b2b22';ctx.strokeRect(p.x,p.y,54,42);if(p.crop){const cr=crop(p.crop),pr=progress(p);ctx.fillStyle=p.variant?.color||cr.color;let h=8+Math.floor(pr*24);ctx.fillRect(p.x+22,p.y+34-h,12,h);ctx.fillStyle='#295f34';ctx.fillRect(p.x+14,p.y+28,10,4);ctx.fillRect(p.x+30,p.y+24,10,4);if(pr>=1){ctx.strokeStyle=p.variant?.color||'#fff';ctx.strokeRect(p.x+18,p.y+6,20,24)}}}ctx.fillStyle='#2b1d16';ctx.fillRect(600,75,106,96);ctx.fillStyle='#c78b31';ctx.fillRect(614,45,78,36);ctx.fillStyle='#5ee7ff';ctx.fillText('SEEDS',628,100);drawAvatar(ctx,save.player.x,save.player.y,2.5)}
function update(){let sp=3;if(keys.has('arrowleft')||keys.has('a'))save.player.x-=sp;if(keys.has('arrowright')||keys.has('d'))save.player.x+=sp;if(keys.has('arrowup')||keys.has('w'))save.player.y-=sp;if(keys.has('arrowdown')||keys.has('s'))save.player.y+=sp;if(pointer.down){save.player.x+=(pointer.x-save.player.x)*.06;save.player.y+=(pointer.y-save.player.y)*.06}save.player.x=Math.max(20,Math.min(c.width-20,save.player.x));save.player.y=Math.max(50,Math.min(c.height-16,save.player.y))}
function nearestPlot(){let best=null,d=1e9;for(const p of save.plots){let dx=p.x+27-save.player.x,dy=p.y+21-save.player.y,dd=dx*dx+dy*dy;if(dd<d){d=dd;best=p}}return d<2800?best:null}
function usePlot(){const p=nearestPlot();if(!p)return log('Move closer to a garden plot.');if(!p.crop){if((save.seeds[save.selected]||0)<1)return log('Buy seeds first.');save.seeds[save.selected]--;Object.assign(p,{crop:save.selected,watered:true,plantedAt:Date.now(),variant:null});return log(`Planted ${crop(save.selected).name}.`)}if(!p.watered){p.watered=true;return log('Watered crop.')}if(progress(p)<1)return log('Still growing.');const cr=crop(p.crop),v=p.variant,val=Math.round(cr.value*(v?.mult||1));save.coins+=val;save.harvests++;unlockFrom(p.crop,v);Object.assign(p,{crop:null,watered:false,plantedAt:0,variant:null});account.receipts=[{game:'Prism Grove',result:'Harvest',stat:`+${val} coins`,date:new Date().toISOString()},...(account.receipts||[])].slice(0,8);log(`Harvested ${v?`${v.name} `:''}${cr.name} for ${val} coins.`)}
function unlockFrom(id,v){const a=account.avatar||defaultAvatar;function add(cid,msg){if(!a.unlocked.includes(cid)){a.unlocked.push(cid);a.cosmetics.push(cid);log(`Cosmetic unlocked: ${msg}`)}}if(save.harvests===5)add('garden-overalls','Garden Overalls');if(id==='carrot')add('orange-work-gloves','Orange Work Gloves');if(id==='pumpkin')add('pumpkin-cap','Pumpkin Cap');if(v?.name==='Moonlit')add('moon-cloak','Moon Cloak');if(v?.name==='Crystal')add('crystal-boots','Crystal Boots');if(v?.name==='Prism')add('prism-pin','Prism Pin');account.avatar=a}
function buy(id){const cr=crop(id);if(save.coins<cr.seedPrice)return log('Not enough coins.');save.coins-=cr.seedPrice;save.seeds[id]=(save.seeds[id]||0)+1;save.selected=id;log(`Bought ${cr.name} seed.`);renderUI();persist()}
function renderUI(){document.querySelector('#stats').textContent=`Coins ${save.coins} · Selected ${crop(save.selected).name} · Harvests ${save.harvests}`;document.querySelector('#seedShop').innerHTML=crops.map(cr=>`<button ${save.selected===cr.id?'class="primary"':''} data-buy="${cr.id}"><span>${cr.name}</span><span>${cr.seedPrice}c · ${save.seeds[cr.id]||0}</span></button>`).join('');document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy(b.dataset.buy));document.querySelector('#log').innerHTML=save.log.map(x=>`<span class="pill">${x}</span>`).join('');const a=account.avatar||defaultAvatar;document.querySelector('#avatarTags').innerHTML=[a.displayName,a.body,...(a.cosmetics||[])].map(x=>`<span class="pill good">${x}</span>`).join('')}
function openCharacterCreator(lock=false){const d=document.querySelector('#creator'),a=account.avatar||defaultAvatar;nameInput.value=a.displayName;bodyInput.value=a.body;skinInput.value=a.skin;hairInput.value=a.hair;topInput.value=a.top;accessoryInput.value=a.accessory;drawPreview();d.showModal();if(lock)d.querySelector('[value="cancel"]').hidden=true}function drawPreview(){const g=avatarPreview.getContext('2d');g.imageSmoothingEnabled=false;g.clearRect(0,0,128,160);g.fillStyle='#101018';g.fillRect(0,0,128,160);drawAvatar(g,64,108,4)}
for(const id of ['skinInput','hairInput','topInput','accessoryInput','bodyInput'])document.getElementById(id).oninput=drawPreview;openCreator.onclick=()=>openCharacterCreator();saveAvatar.onclick=()=>{account.avatar={...(account.avatar||defaultAvatar),displayName:nameInput.value||'Gardener',body:bodyInput.value,skin:skinInput.value,hair:hairInput.value,top:topInput.value,accessory:accessoryInput.value};account.displayName=account.avatar.displayName;persist();renderUI()};
addEventListener('keydown',e=>{keys.add(e.key.toLowerCase());if([' ','e'].includes(e.key.toLowerCase()))usePlot();if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))e.preventDefault()});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));c.addEventListener('pointerdown',e=>{const r=c.getBoundingClientRect();pointer.x=(e.clientX-r.left)*c.width/r.width;pointer.y=(e.clientY-r.top)*c.height/r.height;pointer.down=true;if(nearestPlot())usePlot()});addEventListener('pointerup',()=>pointer.down=false);
applyOfflineGrowth();renderUI();persist();if(!hadAccount)openCharacterCreator(true);function loop(){update();draw();requestAnimationFrame(loop)}loop();setInterval(()=>{save.lastSeen=Date.now();persist()},5000);
</script>
</body>
</html>
