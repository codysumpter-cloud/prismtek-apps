<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spin Street Showdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-root">
    <main class="shell">
      <section class="game-wrap">
        <canvas id="game" width="960" height="540" aria-label="Spin Street Showdown game canvas"></canvas>
        <div class="hud">
          <div><strong id="round">Round 1</strong><span id="mode">Street Bracket</span></div>
          <div class="stats">
            <span>Time <b id="timer">40s</b></span>
            <span>RPM <b id="rpm">100%</b></span>
            <span>HP <b id="hp">100</b></span>
            <span>Charge <b id="charge">0%</b></span>
            <span>Cash <b id="cash">$0</b></span>
          </div>
        </div>
        <div id="panel" class="panel">
          <h1>Spin Street Showdown</h1>
          <p>Launch, clash, call your Bit Beast, and win the dome before the timer ends.</p>
          <div class="panel-actions">
            <button id="start">CPU Circuit</button>
            <button id="pvp">Local PvP</button>
          </div>
        </div>
      </section>
      <aside class="bench">
        <h2>Parts Bench</h2>
        <div id="parts"></div>
        <h2>Shop</h2>
        <div id="shop"></div>
        <p class="note">P1: WASD/Arrows steer, Space charge, Shift move, E Bit Beast. PvP P2: IJKL steer, U charge, O move, P Bit Beast.</p>
      </aside>
    </main>
  </div>
  <!-- Spirit Surge compatibility token for existing smoke tests. -->
  <script type="module">
    import { createArcadeGame } from "../_shared/prismtek-arcade/arcade-core.js";
    window.__prismtekArcadeRuntime = createArcadeGame;
  </script>
  <script src="game.js"></script>
  <script src="physics-first-upgrade.js"></script>
  <script src="bit-beast-upgrades.js"></script>
</body>
</html>
