<body>
<canvas id="game"></canvas>
<section class="hud"><h1>Prismwilds: Echo Dominion</h1><p id="creatureLine"></p><p id="zoneLine"></p><p id="statusLine"></p><div id="meters"></div></section>

<nav class="species" id="speciesNav"></nav>
<script>
(() => {
'use strict';

const creatureLine=document.getElementById('creatureLine'),zoneLine=document.getElementById('zoneLine'),statusLine=document.getElementById('statusLine'),meters=document.getElementById('meters'),speciesNav=document.getElementById('speciesNav');
ctx.imageSmoothingEnabled=false;
const WORLD={w:3400,h:2500},UNDERPOPULATED_PLAYER_TARGET=8;
const C={grass:'#17351e',grove:'#214728',swamp:'#1a3c37',cave:'#191b1a',ridge:'#574529',caldera:'#263f2a',water:'#155d7a',deep:'#073c63',cover:'#254f2d',berry:'#d94f84',fern:'#88d667',meat:'#9b5a3d',gold:'#ffe178',danger:'#ff756b'};
const species=[

{id:'embermite',name:'Embermite',diet:'carnivore',role:'swarm predator',color:'#ff8b4a',sec:'#612719',size:17,speed:2.8,stealth:1.15,water:.15,hp:76,dmg:14,ability:'Cinder Dash'},
{id:'tidepup',name:'Tidepup',diet:'omnivore',role:'river scout',color:'#58c6ff',sec:'#14527b',size:20,speed:2.35,stealth:1,water:1.25,hp:94,dmg:11,ability:'Ripple Slip'},
{id:'bramblehorn',name:'Bramblehorn',diet:'herbivore',role:'herd tank',color:'#b9c46b',sec:'#5a6230',size:30,speed:1.75,stealth:.55,water:.25,hp:155,dmg:17,ability:'Horn Wall'},
{id:'toxicfrog',name:'Toxicfrog',diet:'omnivore',role:'poison ambusher',color:'#7df494',sec:'#5e38a8',size:21,speed:2.25,stealth:1.3,water:1.1,hp:86,dmg:12,ability:'Toxin Puff'},
{id:'skullwolf',name:'Skullwolf',diet:'carnivore',role:'scent predator',color:'#d6d1bd',sec:'#37332f',size:25,speed:2.65,stealth:.9,water:.2,hp:112,dmg:18,ability:'Blood Track'},
{id:'mossback',name:'Mossback',diet:'herbivore',role:'elder grazer',color:'#93b66d',sec:'#344b2b',size:34,speed:1.45,stealth:.45,water:.4,hp:188,dmg:16,ability:'Rooted Shell'},
{id:'voltwing',name:'Voltwing',diet:'omnivore',role:'glider scout',color:'#ffe86f',sec:'#4b3e93',size:22,speed:2.95,stealth:.8,water:.1,hp:82,dmg:13,ability:'Static Glide'}];
const zones=[['hatchling-grove','Hatchling Grove',620,570,520,C.grove,1],['reedwater-flats','Reedwater Flats',890,1840,610,C.swamp,3],['stoneback-caves','Stoneback Caves',2760,1780,480,C.cave,4],['sunspine-ridge','Sunspine Ridge',2700,620,610,C.ridge,3],['heartwater-caldera','Heartwater Caldera',1700,1250,650,C.caldera,5]].map(z=>({id:z[0],name:z[1],x:z[2],y:z[3],r:z[4],color:z[5],danger:z[6]}));
const waterHoles=[['grove-puddle',530,520,86,'shallow puddle',.68,0,0],['north-stream',1450,610,120,'stream bend',.72,0,1],['reedwater-marsh',910,1860,240,'murky swamp pool',.38,1,1],['cave-spring',2840,1735,108,'hidden cave spring',.78,1,1],['ridge-seep',2550,760,84,'rock seep',.52,0,0],['heartwater-lake',1700,1250,360,'clean deep lake',.96,1,1]].map(w=>({id:w[0],x:w[1],y:w[2],r:w[3],type:w[4],clean:w[5],diveable:!!w[6],hide:!!w[7],central:w[0]==='heartwater-lake'}));
const keys=new Set(),feeders=[],roaming=[],resources=[],cover=[],particles=[],scents=[];let selected=0,paused=false,last=performance.now(),time=0,scentCd=0,abilityCd=0,simPlayers=3;
function rand(a,b){return a+Math.random()*(b-a)}function pick(a){return a[Math.floor(Math.random()*a.length)]}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function scatter(type,n,x1,x2,y1,y2,r1,r2){for(let i=0;i<n;i++)cover.push({type,x:rand(x1,x2),y:rand(y1,y2),r:rand(r1,r2),top:i%3===0})}
function food(name,kind,n,x1,x2,y1,y2,central=false){for(let i=0;i<n;i++)resources.push({name,kind,x:rand(x1,x2),y:rand(y1,y2),max:central?72:46,amount:central?72:46,regen:central?.04:.018,central})}
scatter('tall-grass',38,240,1080,220,1000,24,65);scatter('reeds',34,620,1260,1520,2200,26,78);scatter('ruin-shadow',20,1370,2060,910,1560,30,92);scatter('cave-shadow',26,2380,3180,1430,2090,24,76);scatter('dry-brush',26,2310,3120,270,980,22,70);scatter('tree-shadow',48,140,1180,160,1060,24,84);
food('berries','plant',42,250,1220,210,1120);food('fern-bed','plant',34,220,1180,330,1300);food('aquatic-plants','plant',24,620,1120,1660,2150);food('roots','plant',18,2500,3150,1500,2050);food('cactus-fruit','plant',24,2300,3160,350,900);food('rare-bloom','plant',16,1410,2010,990,1510,true);food('carcass','meat',14,1250,2150,860,1640,true);food('fish','meat',48,660,1950,1010,2160);
const player={};reset(species[0]);for(let i=0;i<42;i++)spawnFeeder();for(let i=0;i<2;i++)spawnRoamer();setupNav();resize();requestAnimationFrame(loop);
addEventListener('resize',resize);addEventListener('keydown',e=>{let k=e.key.toLowerCase();keys.add(k);if(k==='tab'){e.preventDefault();selected=(selected+1)%species.length;reset(species[selected]);setupNav()}if(k==='enter')reset(species[selected]);if(k==='p')paused=!paused});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));canvas.addEventListener('pointerdown',attack);
function resize(){let d=Math.min(2,devicePixelRatio||1);canvas.width=innerWidth*d;canvas.height=innerHeight*d;ctx.imageSmoothingEnabled=false}
function loop(now){let dt=Math.min(.045,(now-last)/1000);last=now;if(!paused)update(dt);draw();requestAnimationFrame(loop)}
function reset(s){Object.assign(player,{s,x:520,y:540,face:0,hp:s.hp,maxHp:s.hp,stamina:100,hunger:82,thirst:86,oxygen:100,growth:.18,size:s.size*.85,diving:false,crouch:false,hidden:false,noise:0,latched:false})}
function axis(a,b,c,d){return(keys.has(c)||keys.has(d)?1:0)-(keys.has(a)||keys.has(b)?1:0)}
function update(dt){time+=dt;scentCd=Math.max(0,scentCd-dt);abilityCd=Math.max(0,abilityCd-dt);let dx=axis('arrowleft','a','arrowright','d'),dy=axis('arrowup','w','arrowdown','s'),m=Math.hypot(dx,dy)||1,w=getWater(player.x,player.y),cv=getCover(player.x,player.y);player.crouch=keys.has('c');let sprint=keys.has('shift')&&player.stamina>3&&!player.crouch,wm=w?(.52+player.s.water*.38):1,spd=player.s.speed*wm*(player.crouch?.48:1)*(sprint?1.55:1)*(.82+player.growth*.36);if(dx||dy){player.face=Math.atan2(dy,dx);player.x+=dx/m*spd*60*dt;player.y+=dy/m*spd*60*dt;player.noise=(sprint?1:.45)*(w&&!player.diving?1.5:1)*(player.crouch?.24:1);if(sprint)player.stamina-=14*dt}else player.noise=player.crouch?.08:.18;player.x=clamp(player.x,30,WORLD.w-30);player.y=clamp(player.y,30,WORLD.h-30);if(keys.has('f'))eat();if(keys.has('q'))drink();if(keys.has('e')&&!player.latched){dive();player.latched=true}if(!keys.has('e'))player.latched=false;if(keys.has(' ')||keys.has('spacebar'))attack();if(keys.has('1'))ability();if(keys.has('r'))scent();player.thirst-= (w?.85:1.15)*dt;player.hunger-= (player.s.size>28?1.1:.82)*dt;player.stamina+= (player.crouch?15:9)*dt;if(w&&player.diving){player.oxygen-=(player.s.water>=1?4.5:9.5)*dt;player.stamina-=3.5*dt;if(Math.random()<dt*2)part(player.x,player.y-player.size,'#b9f1ff')}else player.oxygen+=22*dt;if(!w)player.diving=false;if(player.oxygen<=0)player.hp-=9*dt;if(player.hunger<=0)player.hp-=4.5*dt;if(player.thirst<=0)player.hp-=6.5*dt;if(player.hunger>45&&player.thirst>45&&player.hp<player.maxHp)player.hp+=2.4*dt;if(player.hunger>35&&player.thirst>35)player.growth+=.006*dt;['hp','stamina','hunger','thirst','oxygen'].forEach(k=>player[k]=clamp(player[k],0,k==='hp'?player.maxHp:100));player.growth=clamp(player.growth,0,1);player.hidden=hidden(w,cv);if(player.hp<=0)reset(player.s);updateFeeders(dt);updateRoamers(dt);resources.forEach(r=>r.amount=Math.min(r.max,r.amount+r.regen*dt));particles.forEach(p=>{p.life-=dt;p.y+=p.vy*dt});for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);scents.forEach(s=>s.life-=dt);for(let i=scents.length-1;i>=0;i--)if(scents[i].life<=0)scents.splice(i,1);if(simPlayers<UNDERPOPULATED_PLAYER_TARGET&&feeders.length<64&&Math.random()<dt*.8)spawnFeeder();if(simPlayers<UNDERPOPULATED_PLAYER_TARGET&&roaming.length<4&&Math.random()<dt*.04)spawnRoamer();hud(w,cv)}
function hidden(w,cv){let score=0;if(player.crouch)score+=.35*player.s.stealth;if(cv)score+=(cv.type.includes('shadow')?.42:.32)*player.s.stealth;if(w&&player.diving&&w.hide)score+=.55*player.s.water;if(player.s.size>28)score-=.45;if(player.noise>.9)score-=.3;return score>.55}
function updateFeeders(dt){feeders.forEach(f=>{let d=dist(f,player);if(d<220&&!player.hidden){f.flee=Math.atan2(f.y-player.y,f.x-player.x);f.t=1.6}if(f.t>0){f.t-=dt;f.x+=Math.cos(f.flee)*f.speed*70*dt;f.y+=Math.sin(f.flee)*f.speed*70*dt}else{f.w+=Math.sin(f.x*.02+f.y*.03+time)*.03;f.x+=Math.cos(f.w)*f.speed*26*dt;f.y+=Math.sin(f.w)*f.speed*26*dt}f.x=clamp(f.x,40,WORLD.w-40);f.y=clamp(f.y,40,WORLD.h-40)})}
function updateRoamers(dt){roaming.forEach(r=>{let t=r.route[r.i],a=Math.atan2(t.y-r.y,t.x-r.x);r.x+=Math.cos(a)*r.speed*34*dt;r.y+=Math.sin(a)*r.speed*34*dt;if(dist(r,t)<50)r.i=(r.i+1)%r.route.length;let d=dist(r,player);if(d<r.aggro&&!player.hidden){r.alert=1.5;if(r.kind==='lone-apex'||r.kind==='carrion-stalker'){let aa=Math.atan2(player.y-r.y,player.x-r.x);r.x+=Math.cos(aa)*r.speed*44*dt;r.y+=Math.sin(aa)*r.speed*44*dt;if(d<r.size+player.size)player.hp-=18*dt}}r.alert=Math.max(0,r.alert-dt)})}
function eat(){let near=resources.filter(r=>r.amount>3&&dist(r,player)<46).sort((a,b)=>dist(a,player)-dist(b,player))[0];if(!near)return;let can=near.kind==='plant'?player.s.diet!=='carnivore':player.s.diet!=='herbivore';if(!can){statusLine.textContent=`${player.s.name} cannot digest ${near.name}.`;return}let bite=Math.min(near.amount,18);near.amount-=bite;player.hunger=Math.min(100,player.hunger+bite*(near.central?1.7:1.2));if(near.name==='rare-bloom')player.growth=Math.min(1,player.growth+.035)}
function drink(){let w=getWater(player.x,player.y,36);if(!w)return;player.thirst=Math.min(100,player.thirst+26*w.clean);w.clean=Math.max(.25,w.clean-.0025)}
function dive(){let w=getWater(player.x,player.y);if(!w||!w.diveable){statusLine.textContent='This water is too shallow to dive.';return}if(player.s.water<1&&player.stamina<55){statusLine.textContent='This creature needs more stamina to dive safely.';return}player.diving=!player.diving}
function scent(rad=310){if(scentCd>0)return;scentCd=2.5;scents.push({x:player.x,y:player.y,r:rad,life:1.2,max:1.2})}
function attack(){if(time-(player.lastAtk||0)<.28)return;player.lastAtk=time;player.stamina=Math.max(0,player.stamina-9);let range=player.size+34+player.growth*22,ax=player.x+Math.cos(player.face)*range,ay=player.y+Math.sin(player.face)*range;part(ax,ay,'#fff2a8');for(let i=feeders.length-1;i>=0;i--)if(Math.hypot(feeders[i].x-ax,feeders[i].y-ay)<range){resources.push({name:'small-carcass',kind:'meat',x:feeders[i].x,y:feeders[i].y,max:34,amount:34,regen:0,central:false});feeders.splice(i,1);return}roaming.forEach(r=>{if(Math.hypot(r.x-ax,r.y-ay)<range+r.size){r.hp-=player.s.dmg*(1+player.growth);r.alert=2.5;if(r.hp<=0){resources.push({name:'large-carcass',kind:'meat',x:r.x,y:r.y,max:120,amount:120,regen:.04,central:true});r.hp=180;r.x=1700+rand(-600,600);r.y=1250+rand(-400,400)}}})}
function ability(){if(abilityCd>0||player.stamina<18)return;abilityCd=3.2;player.stamina-=18;if(player.s.water>=1){player.x+=Math.cos(player.face)*115;player.y+=Math.sin(player.face)*115;player.diving=!!getWater(player.x,player.y);part(player.x,player.y,'#9befff')}else if(player.s.id==='bramblehorn'||player.s.id==='mossback'){player.hp=Math.min(player.maxHp,player.hp+18)}else if(player.s.id==='skullwolf'){scent(420);abilityCd=1.5}else{player.x+=Math.cos(player.face)*80;player.y+=Math.sin(player.face)*80;part(player.x,player.y,player.s.color)}}
function draw(){let cam=camera();ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(-cam.x,-cam.y);ctx.fillStyle=C.grass;ctx.fillRect(0,0,WORLD.w,WORLD.h);zones.forEach(z=>{ctx.fillStyle=z.color;circle(z.x,z.y,z.r);ctx.fill();ctx.strokeStyle=z.id==='heartwater-caldera'?'rgba(255,225,120,.35)':'rgba(255,255,255,.08)';ctx.lineWidth=z.id==='heartwater-caldera'?8:3;ctx.stroke()});ctx.strokeStyle='rgba(230,213,135,.16)';ctx.lineWidth=18;ctx.setLineDash([22,28]);ctx.beginPath();ctx.ellipse(1700,1250,1120,760,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);waterHoles.forEach(w=>{ctx.fillStyle=w.diveable?C.deep:C.water;circle(w.x,w.y,w.r);ctx.fill();ctx.strokeStyle=w.clean>.8?'rgba(185,241,255,.55)':'rgba(119,95,67,.52)';ctx.lineWidth=w.central?10:5;ctx.stroke()});resources.forEach(r=>{if(r.amount<=2)return;ctx.globalAlpha=clamp(r.amount/r.max,.25,1);ctx.fillStyle=r.kind==='meat'?C.meat:r.name==='rare-bloom'?'#c77dff':r.name.includes('fern')||r.name.includes('plant')||r.name==='roots'?C.fern:C.berry;ctx.fillRect(r.x-6,r.y-6,r.central?16:10,r.central?16:10);ctx.globalAlpha=1});drawCover(false);scents.forEach(s=>{ctx.globalAlpha=s.life/s.max;ctx.strokeStyle='rgba(255,246,164,.42)';ctx.lineWidth=5;circle(s.x,s.y,s.r*(1-s.life/s.max));ctx.stroke();ctx.globalAlpha=1});feeders.forEach(f=>critter(f.x,f.y,f.size,f.color,'#231915',f.w));roaming.forEach(r=>{dino(r.x,r.y,r.size,r.color,r.sec,Math.atan2(player.y-r.y,player.x-r.x));if(r.alert>0){ctx.strokeStyle=C.danger;ctx.lineWidth=3;circle(r.x,r.y,r.size+14);ctx.stroke()}});ctx.globalAlpha=player.hidden?.58:1;dino(player.x,player.y,player.size,player.s.color,player.s.sec,player.face);ctx.globalAlpha=1;ctx.strokeStyle=player.diving?C.water:player.hidden?'rgba(255,246,164,.6)':'#f7ff9a';ctx.lineWidth=3;circle(player.x,player.y,player.size+7);ctx.stroke();drawCover(true);particles.forEach(p=>{ctx.globalAlpha=clamp(p.life,0,1);ctx.fillStyle=p.color;ctx.fillRect(p.x-3,p.y-3,6,6);ctx.globalAlpha=1});ctx.restore();minimap();if(paused){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#e8f8d8';ctx.font='bold 28px monospace';ctx.fillText('PAUSED',canvas.width/2-56,canvas.height/2)}}
function drawCover(top){cover.forEach(c=>{if(c.top!==top)return;ctx.globalAlpha=top?.68:.9;ctx.fillStyle=c.type.includes('reeds')?'#3f7743':c.type.includes('shadow')?'rgba(0,0,0,.58)':C.cover;circle(c.x,c.y,c.r);ctx.fill();ctx.globalAlpha=1})}
function dino(x,y,s,a,b,ang){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.fillStyle=b;ctx.fillRect(-s*.7,-s*.35,s*1.05,s*.7);ctx.fillStyle=a;ctx.fillRect(-s*.5,-s*.48,s*.95,s*.96);ctx.fillRect(s*.18,-s*.36,s*.66,s*.72);ctx.fillRect(s*.72,-s*.24,s*.38,s*.48);ctx.fillStyle=b;ctx.fillRect(-s*.94,-s*.18,s*.46,s*.36);ctx.fillRect(-s*.16,s*.38,s*.18,s*.42);ctx.fillRect(.22*s,s*.36,s*.18,s*.42);ctx.fillStyle='#fff8c6';ctx.fillRect(s*.92,-s*.1,4,4);ctx.restore()}
function critter(x,y,s,a,b,ang){ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.fillStyle=b;ctx.fillRect(-s,-s/2,s*1.6,s);ctx.fillStyle=a;ctx.fillRect(-s*.7,-s*.7,s*1.35,s*1.25);ctx.fillRect(s*.35,-s*.4,s*.7,s*.8);ctx.restore()}
function spawnFeeder(){let kinds=[['field hare','#c9a878',8,1.35],['marsh frog','#67c86f',7,1.1],['river fish','#8de3ff',7,1.25,true],['nest bird','#d8d0a1',6,1.55],['beetle grub','#e1d6b2',5,.85]],k=pick(kinds),w=pick(waterHoles),x=k[4]?w.x+rand(-w.r*.65,w.r*.65):rand(180,WORLD.w-180),y=k[4]?w.y+rand(-w.r*.65,w.r*.65):rand(180,WORLD.h-180);feeders.push({name:k[0],color:k[1],size:k[2],speed:k[3],x,y,w:rand(0,Math.PI*2),t:0})}
function spawnRoamer(){let kinds=[['gentle-grazer-herd','#a6c06b','#40502d',46,.78,180,120],['lone-apex','#d45f4d','#3b1513',58,1.02,240,260],['riverback','#5498af','#143b55',50,.9,210,180],['carrion-stalker','#cabd9e','#342c22',39,1.18,140,220]],k=pick(kinds),route=[{x:1700,y:1250},{x:900,y:1840},{x:540,y:560},{x:2700,y:680},{x:2860,y:1780}].sort(()=>Math.random()-.5);roaming.push({kind:k[0],color:k[1],sec:k[2],size:k[3],speed:k[4],hp:k[5],aggro:k[6],x:route[0].x+rand(-120,120),y:route[0].y+rand(-120,120),route,i:1,alert:0})}
function getWater(x,y,p=0){return waterHoles.find(w=>Math.hypot(x-w.x,y-w.y)<w.r+p)||null}function getCover(x,y){return cover.find(c=>Math.hypot(x-c.x,y-c.y)<c.r)||null}function zone(){return zones.slice().sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)/a.r-Math.hypot(player.x-b.x,player.y-b.y)/b.r)[0]}
function camera(){return{x:clamp(player.x-canvas.width/2,0,WORLD.w-canvas.width),y:clamp(player.y-canvas.height/2,0,WORLD.h-canvas.height)}}function circle(x,y,r){ctx.beginPath();ctx.arc(Math.round(x),Math.round(y),Math.round(r),0,Math.PI*2)}function part(x,y,color){particles.push({x,y,color,life:.55,vx:rand(-18,18),vy:rand(-34,12)})}
function minimap(){let w=184,h=136,x=canvas.width-w-18,y=canvas.height-h-74;ctx.fillStyle='rgba(0,0,0,.48)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.strokeRect(x,y,w,h);zones.forEach(z=>{ctx.fillStyle=z.id==='heartwater-caldera'?'#ffe178':'#7aa868';ctx.globalAlpha=z.id==='heartwater-caldera'?.8:.35;ctx.beginPath();ctx.arc(x+z.x/WORLD.w*w,y+z.y/WORLD.h*h,z.r/WORLD.w*w,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});ctx.fillStyle='#fff';ctx.fillRect(x+player.x/WORLD.w*w-2,y+player.y/WORLD.h*h-2,4,4)}
function hud(w,cv){let z=zone(),stage=player.growth<.25?'Hatchling':player.growth<.55?'Juvenile':player.growth<.9?'Adult':'Elder';creatureLine.textContent=`${player.s.name} · ${stage} · ${player.s.diet} · ${player.s.role}`;zoneLine.textContent=`${z.name} · danger ${z.danger}/5${w?` · ${w.type}${w.diveable?' · diveable':''}`:''}${cv?` · cover: ${cv.type}`:''}`;statusLine.textContent=player.hidden?'Hidden: scent/noise reduced. Ambush goblin mode.':player.diving?'Diving: oxygen drains, bubbles can reveal you.':abilityCd>0?`${player.s.ability} cooling down.`:`${player.s.ability} ready. Simulated players: ${simPlayers}/${UNDERPOPULATED_PLAYER_TARGET}.`;let rows=[['HP',player.hp,player.maxHp,'#ff756b'],['Stamina',player.stamina,100,'#ffe178'],['Hunger',player.hunger,100,'#9bf47d'],['Thirst',player.thirst,100,'#6dd6ff'],['Oxygen',player.oxygen,100,'#b9f1ff'],['Growth',player.growth*100,100,'#c77dff']];meters.innerHTML=rows.map(r=>{let p=Math.round(clamp(r[1]/r[2],0,1)*100);return`<div class="meter"><span>${r[0]}</span><span class="bar"><span class="fill" style="width:${p}%;background:${r[3]}"></span></span><span>${p}%</span></div>`}).join('')}
function setupNav(){speciesNav.innerHTML='';species.forEach((s,i)=>{let b=document.createElement('button');b.className=i===selected?'active':'';b.textContent=`${s.name} · ${s.diet}`;b.onclick=()=>{selected=i;reset(s);setupNav()};speciesNav.appendChild(b)})}
})();
</script>
