name: Feature request
description: Suggest a product or developer-experience improvement
title: "feat: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - onboarding
        - Buddy shell
        - Buddy packs
        - receipts / memory / trust controls
        - linked accounts / pairing
        - API / backend
        - build / release / CI
        - developer experience
        - other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
