name: ci

on:
  push:
    branches:
      - main
      - master
      - feat/**
      - fix/**
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Validate key files exist
        run: |
          test -f README.md
          test -f package.json
          test -f package-lock.json
          test -f turbo.json
          test -d apps
          test -d packages
          test -f apps/web/package.json
          test -f apps/api/package.json
          test -f apps/bemore-macos/package.json
          test -f apps/bemore-macos/server.ts
          test -f packages/core/package.json
          test -f packages/app-factory/package.json
          test -f packages/sandbox/package.json
          test -f packages/agent-protocol/package.json
          test -f packages/workspace-core/package.json
          test -f packages/receipts-core/package.json

      - name: Install dependencies
        run: npm ci

      - name: Install Linux Tailwind native binding
        if: runner.os == 'Linux'
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.2.2

      - name: Typecheck web app
        run: npm --workspace apps/web run lint

      - name: Typecheck shared packages
        run: |
          npm --workspace packages/core run lint
          npm --workspace packages/app-factory run lint
          npm --workspace packages/sandbox run lint
          npm --workspace packages/agent-protocol run lint
          npm --workspace packages/workspace-core run lint
          npm --workspace packages/receipts-core run lint

      - name: Typecheck BeMore Mac app
        run: npm --workspace apps/bemore-macos run lint

      - name: Build repository
        run: npm run build
