name: codeql

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 8 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  preflight:
    runs-on: [self-hosted, prismtek-apps]
    outputs:
      codeql-enabled: ${{ steps.codeql.outputs.enabled }}
    steps:
      - name: Decide whether CodeQL can upload
        id: codeql
        run: |
          if [ "${{ vars.ENABLE_CODEQL }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CodeQL is skipped because this repository has not explicitly opted into code scanning uploads."
          elif [ "${{ github.event.repository.private }}" = "true" ] && [ "${{ vars.ENABLE_PRIVATE_CODEQL }}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CodeQL upload is skipped because this private repository does not have GitHub Advanced Security enabled."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    needs: preflight
    if: needs.preflight.outputs.codeql-enabled == 'true'
    runs-on: [self-hosted, prismtek-apps]
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Linux Tailwind native binding
        if: runner.os == 'Linux'
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
