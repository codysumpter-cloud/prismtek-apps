name: codeql

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 8 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  preflight:
    runs-on: [self-hosted, prismtek-apps]
    outputs:
      codeql-enabled: 'true'
    steps:
      - name: Force CodeQL Enabled
        run: echo "enabled=true" >> "$GITHUB_OUTPUT"

  analyze:
    needs: preflight
    if: needs.preflight.outputs.codeql-enabled == 'true'
    runs-on: [self-hosted, prismtek-apps]
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          npm ci

      - name: Install Linux Tailwind native binding
        if: runner.os == 'Linux'
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
