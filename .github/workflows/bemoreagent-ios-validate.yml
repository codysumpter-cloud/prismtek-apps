name: BeMoreAgent iOS validation

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: bemoreagent-ios-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Generate and build BeMoreAgent
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/bemore-ios-native
    env:
      XCODE_DEVELOPER_DIR: ${{ vars.BEMOREAGENT_XCODE_DEVELOPER_DIR != '' && vars.BEMOREAGENT_XCODE_DEVELOPER_DIR || '/Applications/Xcode.app/Contents/Developer' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect iOS source changes
        id: ios_changes
        working-directory: .
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -q '^apps/bemore-ios-native/'; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "No apps/bemore-ios-native changes detected; skipping simulator build."
          fi

      - name: Select Xcode
        if: steps.ios_changes.outputs.run_build == 'true'
        run: |
          xcode_app="${XCODE_DEVELOPER_DIR%/Contents/Developer}"
          test -d "$xcode_app"
          echo "DEVELOPER_DIR=$XCODE_DEVELOPER_DIR" >> "$GITHUB_ENV"
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo xcode-select -s "$xcode_app"
          else
            echo "Skipping xcode-select; using DEVELOPER_DIR=$XCODE_DEVELOPER_DIR"
          fi

      - name: Show Xcode version
        if: steps.ios_changes.outputs.run_build == 'true'
        run: |
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk iphonesimulator --show-sdk-version)"
          echo "iPhoneSimulator SDK $SDK_VERSION"

      - name: Install XcodeGen if needed
        if: steps.ios_changes.outputs.run_build == 'true'
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Show app version and build
        if: steps.ios_changes.outputs.run_build == 'true'
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' BeMoreAgentShell/Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' BeMoreAgentShell/Info.plist)
          echo "Building BeMoreAgent $VERSION ($BUILD)"

      - name: Generate project
        if: steps.ios_changes.outputs.run_build == 'true'
        run: xcodegen generate

      - name: Build for iOS Simulator
        if: steps.ios_changes.outputs.run_build == 'true'
        run: |
          set -o pipefail
          xcodebuild \
            -project BeMoreAgent.xcodeproj \
            -scheme BeMoreAgent \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData \
            build 2>&1 | tee bemoreagent-ios-build.log

      - name: Upload iOS build log
        if: always() && steps.ios_changes.outputs.run_build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: bemoreagent-ios-build-log
          path: apps/bemore-ios-native/bemoreagent-ios-build.log

      - name: Publish validation summary
        if: always()
        run: |
          if [ "${{ steps.ios_changes.outputs.run_build }}" != "true" ]; then
            {
              echo '## BeMoreAgent iOS validation'
              echo ''
              echo '- Skipped: no apps/bemore-ios-native changes in this pull request.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' BeMoreAgentShell/Info.plist)
          BUILD=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' BeMoreAgentShell/Info.plist)
          {
            echo '## BeMoreAgent iOS validation'
            echo ''
            echo "- Version: $VERSION ($BUILD)"
            echo '- Project generated from apps/bemore-ios-native/project.yml'
            echo '- Destination: generic/platform=iOS Simulator'
          } >> "$GITHUB_STEP_SUMMARY"
