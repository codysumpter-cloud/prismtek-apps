name: Migrate Wildlands Critter Clash

on:
  push:
    branches:
      - migrate/wildlands-critter-clash
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, 'Migrate Wildlands Critter Clash into games workspace') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Prismtek Apps branch
        uses: actions/checkout@v4
        with:
          ref: migrate/wildlands-critter-clash
          fetch-depth: 0
          persist-credentials: true

      - name: Copy Wildlands into games workspace
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/wildlands-critter-clash-source
          git clone --depth 1 https://github.com/codysumpter-cloud/Wildlands-Critter-Clash.git /tmp/wildlands-critter-clash-source

          mkdir -p games/wildlands-critter-clash
          rm -rf games/wildlands-critter-clash
          mkdir -p games/wildlands-critter-clash

          rsync -a \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='out/' \
            /tmp/wildlands-critter-clash-source/ \
            games/wildlands-critter-clash/

          cat > games/wildlands-critter-clash/CANONICAL_LOCATION.md <<'EOF'
          # Canonical Location

          Wildlands: Critter Clash is now housed in the Prismtek Apps product workspace.

          Canonical path:

          ```text
          games/wildlands-critter-clash/
          ```

          Source migration:

          ```text
          https://github.com/codysumpter-cloud/Wildlands-Critter-Clash
          ```

          New product home:

          ```text
          https://github.com/codysumpter-cloud/prismtek-apps/tree/main/games/wildlands-critter-clash
          ```
          EOF
          sed -i 's/^          //' games/wildlands-critter-clash/CANONICAL_LOCATION.md

      - name: Register Wildlands in root README
        shell: python
        run: |
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')

          top_button = '[<kbd>▶ Open Wildlands: Critter Clash</kbd>](games/wildlands-critter-clash/)'
          if top_button not in text:
              text = text.replace(
                  '[<kbd>▶ Open TamerNet Battle Sandbox</kbd>](games/tamernet-battle-sandbox/)\n',
                  '[<kbd>▶ Open TamerNet Battle Sandbox</kbd>](games/tamernet-battle-sandbox/)\n' + top_button + '\n',
              )

          download_row = '| Wildlands: Critter Clash | [<kbd>▶ Open</kbd>](games/wildlands-critter-clash/) [<kbd>README</kbd>](games/wildlands-critter-clash/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | Migrated first itch.io game; browser/web game with deterministic build and itch packaging scripts. |'
          if download_row not in text:
              text = text.replace(
                  '| TamerNet Battle Sandbox | [<kbd>▶ Open</kbd>](games/tamernet-battle-sandbox/) [<kbd>README</kbd>](games/tamernet-battle-sandbox/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | Playable browser prototype; packaged release artifact pending. |\n',
                  '| TamerNet Battle Sandbox | [<kbd>▶ Open</kbd>](games/tamernet-battle-sandbox/) [<kbd>README</kbd>](games/tamernet-battle-sandbox/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | Playable browser prototype; packaged release artifact pending. |\n' + download_row + '\n',
              )

          run_row = '| Wildlands: Critter Clash | Browser game / itch.io migration | First itch.io game migrated into the Prismtek Apps games workspace; build/release scripts are preserved from the source repo. | [<kbd>▶ Open</kbd>](games/wildlands-critter-clash/) [<kbd>README</kbd>](games/wildlands-critter-clash/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | `cd games/wildlands-critter-clash && npm install && npm run build:all`; for quick local play use `python3 -m http.server 8000`. |'
          if run_row not in text:
              text = text.replace(
                  '| TamerNet Battle Sandbox | Browser game prototype | Playable local browser prototype; no packaged release artifact yet. | [<kbd>▶ Open</kbd>](games/tamernet-battle-sandbox/) [<kbd>README</kbd>](games/tamernet-battle-sandbox/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | `cd games/tamernet-battle-sandbox && python3 -m http.server 8080`, then open `http://localhost:8080`. |\n',
                  '| TamerNet Battle Sandbox | Browser game prototype | Playable local browser prototype; no packaged release artifact yet. | [<kbd>▶ Open</kbd>](games/tamernet-battle-sandbox/) [<kbd>README</kbd>](games/tamernet-battle-sandbox/README.md) [<kbd>⬇ Download ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip) | `cd games/tamernet-battle-sandbox && python3 -m http.server 8080`, then open `http://localhost:8080`. |\n' + run_row + '\n',
              )

          games_section = '''### Wildlands: Critter Clash

[<kbd>▶ Open Wildlands: Critter Clash</kbd>](games/wildlands-critter-clash/)
[<kbd>⬇ Download Source ZIP</kbd>](https://github.com/codysumpter-cloud/prismtek-apps/archive/refs/heads/main.zip)

Wildlands: Critter Clash is Prismtek's first itch.io game, now housed as a first-class game in the monorepo. It is a web-based critter arena game with runtime JSON content, source assets, deterministic build scripts, and itch release packaging preserved from the original repo.

Run from `games/wildlands-critter-clash/`:

```bash
npm install
npm run build:all
python3 -m http.server 8000
```

Then open:

```text
http://localhost:8000
```

Known limits: migrated source is preserved as-is; monorepo-level packaged release/download automation still needs to be standardized with the other games.

'''
          if '### Wildlands: Critter Clash' not in text:
              text = text.replace('## Products\n', games_section + '## Products\n')

          product_row = '| Wildlands: Critter Clash | Game | `games/wildlands-critter-clash/` | First itch.io game migrated into the Prismtek Apps game workspace |'
          if product_row not in text:
              text = text.replace(
                  '| TamerNet Battle Sandbox | Game prototype | `games/tamernet-battle-sandbox/` | Playable browser creature-battle sandbox |\n',
                  '| TamerNet Battle Sandbox | Game prototype | `games/tamernet-battle-sandbox/` | Playable browser creature-battle sandbox |\n' + product_row + '\n',
              )

          path.write_text(text, encoding='utf-8')

      - name: Commit migrated game
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/migrate-wildlands-critter-clash.yml
          git add -A games/wildlands-critter-clash README.md .github/workflows/migrate-wildlands-critter-clash.yml
          if git diff --cached --quiet; then
            echo "No migration changes to commit."
            exit 0
          fi
          git commit -m "Migrate Wildlands Critter Clash into games workspace"
          git push origin HEAD:migrate/wildlands-critter-clash
