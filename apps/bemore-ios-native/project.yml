name: BeMoreAgent
options:
  bundleIdPrefix: com.prismtek
configs:
  Debug: debug
  Release: release
settings:
  IPHONEOS_DEPLOYMENT_TARGET: 18.0
  SWIFT_VERSION: "5.9"

targets:
  MLCSwift:
    type: framework.static
    platform: iOS
    sources:
      - path: Vendors/MLCSwift/Sources/Swift
      - path: Vendors/MLCSwift/Sources/ObjC
    configFiles:
      Debug: Config/MLCRuntime.xcconfig
      Release: Config/MLCRuntime.xcconfig
    settings:
      base:
        PRODUCT_MODULE_NAME: MLCSwift
        GENERATE_INFOPLIST_FILE: YES
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        HEADER_SEARCH_PATHS:
          - "Vendors/MLCSwift/Sources/ObjC/include"
          - "../../tvm_home/include"
          - "../../tvm_home/3rdparty/tvm-ffi/include"
          - "../../tvm_home/3rdparty/tvm-ffi/3rdparty/dlpack/include"
  BeMoreAgent:
    type: application
    platform: iOS
    sources:
      - path: BeMoreAgentShell
        excludes:
          - "**/.DS_Store"
      - path: BeMoreAgentShell/Views/RepoSurfaceDetailView.swift
    resources:
      - path: BundledModels
        type: folder
    postBuildScripts:
      - name: Copy bundled MLC model resources
        script: |
          set -euo pipefail
          SRC="$SRCROOT/BundledModels"
          DEST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/BundledModels"
          if [ -d "$SRC" ]; then
            rm -rf "$DEST"
            mkdir -p "$(dirname "$DEST")"
            ditto "$SRC" "$DEST"
            test -f "$DEST/gemma-4-E2B-it-q4f16_1-MLC/mlc-chat-config.json"
            test -f "$DEST/gemma-4-E2B-it-q4f16_1-MLC/params_shard_0.bin"
          fi
    configFiles:
      Debug: Config/MLCRuntime.xcconfig
      Release: Config/MLCRuntime.xcconfig
    dependencies:
      - target: MLCSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: BeMoreAgent
        INFOPLIST_KEY_CFBundleIdentifier: BeMoreAgent
        INFOPLIST_FILE: BeMoreAgentShell/Info.plist
        DEVELOPMENT_TEAM: DY9FHPRZA9
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: BeMoreAgent
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        SWIFT_BRIDGING_HEADER: BeMoreAgentShell/Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "Vendors/MLCSwift/Sources/ObjC/include"
  BeMoreAgentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeMoreAgentShellTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: BeMoreAgentTests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: DY9FHPRZA9
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: BeMoreAgent
