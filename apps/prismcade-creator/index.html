<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prismcade Creator MVP</title>
  <style>
    :root { color-scheme: dark; --bg:#101018; --panel:#17172a; --line:#2c2c4c; --ink:#f7f7ff; --muted:#a9aac4; --accent:#5ee7ff; --hot:#ff5e78; --good:#7cff9b; --warn:#ffd166; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink); }
    main { max-width:1100px; margin:0 auto; padding:28px 18px 48px; }
    .hero, .panel { border:2px solid var(--line); background:var(--panel); padding:18px; margin-bottom:14px; }
    .eyebrow { color:var(--accent); text-transform:uppercase; letter-spacing:.16em; font-size:12px; margin:0 0 8px; }
    h1 { margin:0; font-size:clamp(30px,6vw,58px); line-height:.92; text-transform:uppercase; }
    p { color:var(--muted); line-height:1.5; }
    .layout { display:grid; grid-template-columns:minmax(260px,380px) 1fr; gap:14px; align-items:start; }
    label { display:block; margin:12px 0 5px; color:var(--accent); font-size:13px; }
    input, select, textarea { width:100%; border:2px solid var(--line); background:#101018; color:var(--ink); padding:9px; font:inherit; }
    textarea { min-height:90px; }
    button { border:2px solid var(--line); background:#20203a; color:var(--ink); padding:9px 12px; font:inherit; cursor:pointer; margin:10px 8px 0 0; }
    button:hover { border-color:var(--accent); color:var(--accent); }
    pre { white-space:pre-wrap; word-break:break-word; background:#08080f; border:2px solid #242442; padding:14px; min-height:380px; overflow:auto; }
    .hint { font-size:12px; color:var(--muted); }
    @media (max-width: 820px) { .layout { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Prismcade Creator</p>
      <h1>Manifest-first MVP</h1>
      <p>Pick a template, name the game, choose metadata, then export a Prismcade manifest. Tiny and useful beats giant and imaginary.</p>
    </section>

    <section class="layout">
      <form class="panel" id="creator">
        <label for="template">Template</label>
        <select id="template"></select>

        <label for="title">Game title</label>
        <input id="title" value="Buddy Bounce" />

        <label for="slug">Slug</label>
        <input id="slug" value="buddy-bounce" />

        <label for="genre">Genre / arcade role</label>
        <input id="genre" value="one-button-reflex" />

        <label for="tags">Tags, comma separated</label>
        <input id="tags" value="quick-play, score-chaser, prismcade" />

        <label for="controls">Controls</label>
        <textarea id="controls">Space / click / tap: action
Restart button: reset run</textarea>

        <label for="assets">Starter asset IDs, comma separated</label>
        <input id="assets" value="prismcade-ui-card-frame, prismcade-default-hero-64" />

        <button type="button" id="copy">Copy JSON</button>
        <button type="button" id="download">Download JSON</button>
        <p class="hint">Place reviewed manifests into `data/prismcade/game-manifests.json` or a future game-local manifest path after validation.</p>
      </form>

      <section class="panel">
        <p class="eyebrow">Preview</p>
        <pre id="output"></pre>
      </section>
    </section>
  </main>

  <script>
    const templates = [
      { id:"arcade-one-button", role:"one-button-reflex", players:{ min:1, max:1 }, tags:["quick-play","one-button","score-chaser"], controls:["Space / click / tap to act"] },
      { id:"arcade-lane-dodge", role:"lane-dodge", players:{ min:1, max:1 }, tags:["quick-play","lane-dodge"], controls:["WASD / arrows move"] },
      { id:"arcade-snake", role:"route-control", players:{ min:1, max:1 }, tags:["quick-play","snake"], controls:["WASD / arrows steer"] },
      { id:"arcade-breakout", role:"paddle-combo", players:{ min:1, max:1 }, tags:["quick-play","combo"], controls:["A/D or arrows move paddle"] },
      { id:"arcade-stacker", role:"precision-timing", players:{ min:1, max:1 }, tags:["quick-play","timing"], controls:["Space / click / tap drops block"] },
      { id:"platform-fighter-lite", role:"platform-fighter", players:{ min:1, max:4 }, tags:["fighter","local-multiplayer"], controls:["P1/P2 keyboard presets", "Gamepad-ready structure"] },
      { id:"top-battle-arena-lite", role:"top-battle-arena", players:{ min:1, max:2 }, tags:["top-battle","physics","customization"], controls:["Pointer/WASD steer", "Ability buttons"] },
      { id:"creature-battle-lite", role:"creature-battle-lite", players:{ min:1, max:1 }, tags:["creature-battle","sandbox"], controls:["WASD move", "1/2/3/4 command moves"] },
      { id:"survival-lite", role:"creature-survival-world", players:{ min:1, max:1 }, tags:["survival","large-showcase","later"], controls:["WASD move", "Interact and ability keys"] }
    ];

    const $ = (id) => document.getElementById(id);
    const templateSelect = $("template");
    for (const template of templates) {
      const option = document.createElement("option");
      option.value = template.id;
      option.textContent = template.id;
      templateSelect.appendChild(option);
    }

    function slugify(value) {
      return value.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "untitled-prismcade-game";
    }

    function selectedTemplate() {
      return templates.find((template) => template.id === templateSelect.value);
    }

    function lines(value) {
      return value.split(/\n+/).map((line) => line.trim()).filter(Boolean);
    }

    function csv(value) {
      return value.split(",").map((part) => part.trim()).filter(Boolean);
    }

    function manifest() {
      const template = selectedTemplate();
      const slug = slugify($("slug").value || $("title").value);
      return {
        schemaVersion: "prismcade-game-manifest-v0",
        id: slug,
        title: $("title").value.trim() || "Untitled Prismcade Game",
        slug,
        path: `games/${slug}`,
        status: "contract-only",
        arcadeRole: $("genre").value.trim() || template.role,
        template: template.id,
        priority: template.id === "survival-lite" ? "later" : "high",
        description: `Generated Prismcade starter from ${template.id}.`,
        tags: [...new Set([...template.tags, ...csv($("tags").value)])],
        thumbnail: `apps/prismcade/assets/thumbnails/${slug}.svg`,
        entrypoint: `games/${slug}/index.html`,
        commands: {
          dev: `cd games/${slug} && npm run dev`,
          test: `cd games/${slug} && npm test`,
          build: `cd games/${slug} && npm run build`,
          package: `cd games/${slug} && npm run package:zip`
        },
        controls: lines($("controls").value).length ? lines($("controls").value) : template.controls,
        players: { ...template.players, modes: ["generated starter"] },
        inputSupport: { keyboard: true, pointer: template.tags.includes("one-button"), touch: template.tags.includes("one-button"), gamepad: false },
        platformStatus: { web: "missing", webZip: "missing" },
        platformHooks: {
          localProfileReady: false,
          localHistoryReady: false,
          matchReceiptReady: false,
          shareCardReady: false,
          leaderboardExportReady: false,
          hostedLeaderboardReady: false
        },
        assets: {
          manifest: null,
          selectedAssetIds: csv($("assets").value),
          nextAssetNeed: "Run through Pixel Forge / pixellab.ai, save prompts/raw/cleaned/metadata, then validate."
        },
        receipts: [],
        nextActions: [
          "Create game folder from selected template.",
          "Wire selected assets.",
          "Run npm test and package zip.",
          "Add receipt before public release claim."
        ]
      };
    }

    function render() {
      $("output").textContent = JSON.stringify(manifest(), null, 2);
    }

    $("title").addEventListener("input", () => {
      $("slug").value = slugify($("title").value);
      render();
    });
    for (const id of ["template", "slug", "genre", "tags", "controls", "assets"]) $(id).addEventListener("input", render);

    $("copy").addEventListener("click", async () => {
      await navigator.clipboard.writeText(JSON.stringify(manifest(), null, 2));
      $("copy").textContent = "Copied";
      setTimeout(() => $("copy").textContent = "Copy JSON", 900);
    });

    $("download").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(manifest(), null, 2) + "\n"], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${manifest().slug}.prismcade-manifest.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    templateSelect.value = "arcade-one-button";
    render();
  </script>
</body>
</html>
